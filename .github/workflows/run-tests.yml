name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.3, 8.2]
        laravel: [13.*, 12.*, 11.*]
        filament: [5.*, 4.*, 3.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 13.*
            testbench: 11.*
            carbon: 3.*
          - laravel: 12.*
            testbench: 10.*
            carbon: 3.*
          - laravel: 11.*
            testbench: 9.*
            carbon: 3.*
        exclude:
          # Laravel 13 nécessite PHP 8.3 minimum
          - laravel: 13.*
            php: 8.2
          # Laravel 12 nécessite PHP 8.2 minimum
          - laravel: 12.*
            php: 8.1
          # Laravel 11 nécessite PHP 8.2 minimum
          - laravel: 11.*
            php: 8.1
          # Filament 3 uniquement avec Laravel 11
          - laravel: 12.*
            filament: 3.*
          # Filament 3 ne supporte pas Laravel 13
          - laravel: 13.*
            filament: 3.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - F${{ matrix.filament }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update --dev
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci
